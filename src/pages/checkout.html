<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/checkout.css">


  <title>HireSpace - Checkout</title>

</head>
<body>

  <div class="bgWave">
  <img src="../assets/wave.svg" alt="">
</div>

<div class="adminWrap">
  
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logoDot">
          <img src="../assets/logo.png" alt="HireSpace logo">
        </div>
        <div class="brandText">
          <div class="name">HireSpace</div>
          <div class="tag">Job Advertisement Portal</div>
        </div>
      </div>
      <div class="nav">
    <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="contact.html">Contact Us</a>
        <a href="profile.html" style="display:flex; align-items:center; gap:6px;">
          <img
            src="../assets/profilePlaceholder.png"
            alt="Profile icon"
            style="width:16px; height:16px; border-radius:50%; object-fit:cover;">
          Profile
        </a>
      </div>
    </div>

  <h2 class="title">Select a Plan</h2>
  <main class="container">
      <div class="plans-container">
       <label for="annual-plan-select" class="plans annual-plan">
        <input type="radio" 
        name="plan-container" 
        id="annual-plan-select"
        class="plan-selector"
        checked>
        <div class="annual-plan-description">
          <h3>Annual Plan</h3>
          <small class="plan-description">Billed annually at £119.88/year</small>
        </div>
        <div class="annual-plan-price">
          <h3 class="price">£9.99/month</h3>
          <small> £119.88 a year</small>
        </div>
       </label>

        <label for="monthly-plan-select" class="plans monthly-plan">
        <input type="radio" 
        name="plan-container" 
        id="monthly-plan-select"
        class="plan-selector"
        checked>
        <div class="annual-plan-description">
          <h3>Monthly Plan</h3>
          <small class="plan-description">Billed monthly at £11.99/month</small>
        </div>
        <div class="annual-plan-price">
          <h3 class="price">£11.99/month</h3>
          <small> £143.88 a year</small>
        </div>
       </label>
      </div>

      <div class="checkout-container">
        <h3 class="plan-type">
          <span class="plan-type-description">Annual Plan</span>
          <span class="plan-type-amount">£111.88/year</span>
        </h3>
        <div class="billing">
          <div class="billing-description">
            <h4>Total</h4>
            <small>Billed annually</small>
          </div>
          <h3 class="billing-amount">£111.88</h3>
        </div>
        <button class="btnPrimary">Checkout</button>
      </div>
  </main>
  </div>

<script>
// Helper to find selected plan
function getSelectedPlan() {
    return document.getElementById('annual-plan-select').checked ? 'annual' : 'monthly';
}

// update UI when radio buttons change (optional)
document.querySelectorAll('.plan-selector').forEach(el => {
    el.addEventListener('change', () => {
        const plan = getSelectedPlan();
        const description = plan === 'annual' ? 'Annual Plan' : 'Monthly Plan';
        const amount = plan === 'annual' ? '£111.99/year' : '£11.99/month';
        document.querySelector('.plan-type-description').textContent = description;
        document.querySelector('.plan-type-amount').textContent = amount;
        document.querySelector('.billing-amount').textContent = amount;
        const billingText = plan === 'annual' ? 'Billed annually' : 'Billed monthly';
        document.querySelector('.billing small').textContent = billingText;
    });
});

// when checkout clicked, ensure user is jobseeker and send subscription to backend
const checkoutButton = document.querySelector('.btnPrimary');
checkoutButton.addEventListener('click', async () => {
    const stored = localStorage.getItem('loggedInUser');
    if (!stored) {
        alert('You must be logged in as a jobseeker to purchase a plan.');
        window.location.href = 'login.html';
        return;
    }
    const user = JSON.parse(stored);
    if (user.role !== 'jobseeker') {
        alert('Only jobseeker accounts can purchase subscriptions.');
        return;
    }

    const plan = getSelectedPlan();
    try {
        const response = await fetch('http://localhost:8080/api/subscriptions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, plan: plan })
        });
        if (!response.ok) {
            const errText = await response.text();
            alert('Subscription failed: ' + errText);
            return;
        }
        const subscription = await response.json();
        alert('Subscription successful. Thank you!');
        // maybe redirect or update UI
    } catch (err) {
        console.error('Checkout error', err);
        alert('Could not contact server.');
    }
});

</script>

</body>
</html>
