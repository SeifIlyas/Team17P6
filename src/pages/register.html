<!DOCTYPE html>
<html lang="en">
<head>
<!--links to fonts- dont touch unless changing ui -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!--link to style.css also dont touch just change style.css-->
<link rel="stylesheet" href="../css/style.css">
  
<!--main user/employer login page-->
  <title>HireSpace - Login</title>
</head>
<body>

<!--The blob wave behind the form-->
<div class="bgWave">
  <img src="../assets/wave.svg" alt="">
</div>

<div class="adminWrap">

 <!--navigation bar and the top logo part -->
  <div class="topbar">
    <div class="brand">
      <div class="logoDot">
        <img src="../assets/logo.png">
      </div>

      <div class="brandText">
        <div class="name">HireSpace</div>
        <div class="tag">Job Advertisement Portal</div>
      </div>
    </div>
<!--navigation bar buttons -->
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="contact.html">Contact Us</a>
      <a href="profile.html" style="display:flex; align-items:center; gap:6px;">
          <img 
            src="../assets/profilePlaceholder.png" alt="Profile icon"style="width:16px; height:16px; border-radius:50%; object-fit:cover;">Profile</a>
    </div>
  </div>


  <!-- user/employer login -->
  <section class="adminHero">

    <div class="adminLeft">


<!--adding text to the page -->
      <div class="heroTitle" style="font-size:52px;">
        Welcome.
      </div>

      <div class="heroSub" style="max-width:42ch;">
       Jobseekers and employers, all in one place. Sign up to find the opportunity for you today.
      </div>

    </div>


<!--right side that will have the form (login/registering) -->
    <div class="adminRight">

      <form class="adminForm">

        <h1>Sign  Up</h1>
        <p>Enter your email and password to continue.</p>

        <div class="fieldGroup">

          <div>
            <div class="label">Full Name</div>
            <input id="name" class="input" type="text" placeholder="Full Name">
          </div>

          <div>
            <div class="label">Role</div>
            <select id="role" class="input">
              <option value="jobseeker">Jobseeker</option>
              <option value="employer">Employer</option>
            </select>
          </div>

          <div>
            <div class="label">Email</div>
            <input id="email" class="input" type="email" placeholder="Email">
          </div>

          <div>
            <div class="label">Password</div>
            <input id="password" class="input" type="password" placeholder="Password">
          </div>

          <div>
            <div class="label">Confirm Password</div>
            <input id="confirmPassword" class="input" type="password" placeholder="Confirm Password">
          </div>


        </div>

        <div class="formActions">
          <button class="btn btnWide" type="button">
            Sign up
          </button>

         

      </form>

    </div>

  </section>

</div>

<script>

/*find the sign up button on the page and run this function when it is clicked*/
document.querySelector(".btnWide").addEventListener("click", async () => {

/*gets the value entered in the name input field*/
  const name = document.getElementById("name").value.trim();

/*gets the selected role from the dropdown*/
  const role = document.getElementById("role").value;

/*gets the email entered by the user*/
  const email = document.getElementById("email").value.trim();

/*gets the password entered by the user*/
  const password = document.getElementById("password").value;

/*gets the confirm password value to compare*/
  const confirmPassword = document.getElementById("confirmPassword").value;

/*checks if any fields are empty before continuing*/
  if (!name || !email || !password || !confirmPassword || !role) {

/*shows a warning if user did not fill in all fields*/
    alert("Please complete all fields.");

/*stops the function if validation fails*/
    return;
  }

/*checks if password and confirm password match*/
  if (password !== confirmPassword) {

/*shows an error message if passwords are different*/
    alert("Passwords do not match.");

/*stops the registration process*/
    return;
  }

/*trys sending the registration request to the backend*/
  try {

/*sends a request to the spring boot register api endpoint, this is what we use to regster a new account*/
    const response = await fetch("http://localhost:8080/api/auth/register", {

/*using post because we are creating a new user, this will send the user data to the database*/
      method: "POST",

/*tells the backend we are sending json data*/
      headers: {
        "Content-Type": "application/json"
      },

/*converts the user data into json format before sending*/
      body: JSON.stringify({
        name: name,
        email: email,
        password: password,
        role: role
      })
    });

/*checks if the backend returned an error*/
    if (!response.ok) {

/*gets the error message from the backend*/
      const errorText = await response.text();

/*shows the error message to the user*/
      alert("Registration failed: " + errorText);

/*stops the rest of the code*/
      return;
    }

/*converts the backend response into a user object*/
    const user = await response.json();

/*stores the logged in user in local storage*/
    localStorage.setItem("loggedInUser", JSON.stringify(user));

/*shows success message*/
    alert("Registration successful.");

/*redirects the user to their profile page*/
    window.location.href = "profile.html";
  } catch (error) {

/*this runs if the frontend cannot connect to the backend*/
    console.error("Register error:", error);

/*shows message telling the user the backend might not be running*/
    alert("Could not connect to backend. Make sure Spring Boot is running.");
  }
});
</script>

</body>
</html>
