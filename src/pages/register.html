<!DOCTYPE html>
<html lang="en">
<head>
<!--links to fonts- dont touch unless changing ui -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!--link to style.css also dont touch just change style.css-->
<link rel="stylesheet" href="../css/style.css">
  
<!--main user/employer login page-->
  <title>HireSpace - Login</title>
</head>
<body>

<!--The blob wave behind the form-->
<div class="bgWave">
  <img src="../assets/wave.svg" alt="">
</div>

<div class="adminWrap">

 <!--navigation bar + top logo part -->
  <div class="topbar">
    <div class="brand">
      <div class="logoDot">
        <img src="../assets/logo.png">
      </div>

      <div class="brandText">
        <div class="name">HireSpace</div>
        <div class="tag">Job Advertisement Portal</div>
      </div>
    </div>
<!--navigation bar buttons -->
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="profile.html" style="display:flex; align-items:center; gap:6px;">
          <img 
            src="../assets/profilePlaceholder.png" alt="Profile icon"style="width:16px; height:16px; border-radius:50%; object-fit:cover;">Profile</a>
    </div>
  </div>


  <!-- user/employer login -->
  <section class="adminHero">

    <div class="adminLeft">


<!--writing of page -->
      <div class="heroTitle" style="font-size:52px;">
        Welcome.
      </div>

      <div class="heroSub" style="max-width:42ch;">
       Jobseekers and employers, all in one place. Sign up to find the opportunity for you today.
      </div>

    </div>


<!--right side- the form (login/registering) -->
    <div class="adminRight">

      <form class="adminForm">

        <h1>Sign  Up</h1>
        <p>Enter your email and password to continue.</p>

        <div class="fieldGroup">

          <div>
            <div class="label">Full Name</div>
            <input id="name" class="input" type="text" placeholder="Full Name">
          </div>

          <div>
            <div class="label">Role</div>
            <select id="role" class="input">
              <option value="jobseeker">Jobseeker</option>
              <option value="employer">Employer</option>
            </select>
          </div>

          <div>
            <div class="label">Email</div>
            <input id="email" class="input" type="email" placeholder="Email">
          </div>

          <div>
            <div class="label">Password</div>
            <input id="password" class="input" type="password" placeholder="Password">
          </div>

          <div>
            <div class="label">Confirm Password</div>
            <input id="confirmPassword" class="input" type="password" placeholder="Confirm Password">
          </div>


        </div>

        <div class="formActions">
          <button class="btn btnWide" type="button">
            Sign up
          </button>

         

      </form>

    </div>

  </section>

</div>

<script>
document.querySelector(".btnWide").addEventListener("click", async () => {
  const name = document.getElementById("name").value.trim();
  const role = document.getElementById("role").value;
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!name || !email || !password || !confirmPassword || !role) {
    alert("Please complete all fields.");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match.");
    return;
  }

  try {
    const response = await fetch("http://localhost:8080/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        email: email,
        password: password,
        role: role
      })
    });

    if (!response.ok) {
      const errorText = await response.text();
      alert("Registration failed: " + errorText);
      return;
    }

    const user = await response.json();
    localStorage.setItem("loggedInUser", JSON.stringify(user));
    alert("Registration successful.");
    window.location.href = "profile.html";
  } catch (error) {
    console.error("Register error:", error);
    alert("Could not connect to backend. Make sure Spring Boot is running.");
  }
});
</script>

</body>
</html>
