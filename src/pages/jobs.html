<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireSpace | Jobs</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <div class="bgWave">
    <img src="../assets/wave.svg" alt="">
  </div>

  <div class="adminWrap">

    <div class="topbar">
      <div class="brand">
        <div class="logoDot">
          <img src="../assets/logo.png" alt="HireSpace logo">
        </div>

        <div class="brandText">
          <div class="name">HireSpace</div>
          <div class="tag">Job Advertisement Portal</div>
        </div>
      </div>

      <div class="nav">
        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="profile.html" style="display:flex; align-items:center; gap:6px;">
          <img
            src="../assets/profilePlaceholder.png"
            alt="Profile icon"
            style="width:16px; height:16px; border-radius:50%; object-fit:cover;">
          Profile
        </a>
      </div>
    </div>

    <main class="container jobsPage">
      <div class="jobsHeader">
        <h1 class="jobsTitle">Find your next role</h1>
        <p class="jobsSub">
          Search by keyword, location and category. Then click a job to view details.
        </p>
      </div>

      <section class="jobsSearchBar">
        <div class="searchField">
          <span class="searchIcon">⌕</span>
          <input type="text" id="searchInput" placeholder="Job title or keywords" />
        </div>

        <select id="locationFilter">
          <option value="">All locations</option>
          <option>Bradford</option>
          <option>Leeds</option>
          <option>Manchester</option>
          <option>London</option>
          <option>Remote</option>
        </select>

        <select id="categoryFilter">
          <option value="">All categories</option>
          <option>Software Engineering</option>
          <option>Data / AI</option>
          <option>Cyber Security</option>
          <option>Business / Admin</option>
        </select>

        <button class="btnPrimary" type="button" onclick="loadJobs()">Search</button>
        <button class="btnGhost" type="button" onclick="clearFilters()">Clear</button>
      </section>

      <section class="jobsLayout">
        <aside class="filtersPanel">
          <div class="panelTitle">Filters</div>

          <div class="filterBlock">
            <div class="filterLabel">Job type</div>
            <label class="checkRow"><input type="checkbox" value="Full-time" class="jobTypeFilter" /> Full-time</label>
            <label class="checkRow"><input type="checkbox" value="Part-time" class="jobTypeFilter" /> Part-time</label>
            <label class="checkRow"><input type="checkbox" value="Contract" class="jobTypeFilter" /> Contract</label>
            <label class="checkRow"><input type="checkbox" value="Internship" class="jobTypeFilter" /> Internship</label>
            <label class="checkRow"><input type="checkbox" value="Remote" class="jobTypeFilter" /> Remote</label>
          </div>

          <div class="filterBlock">
            <div class="filterLabel">Salary</div>
            <div class="rangeRow">
              <input type="number" id="minSalary" placeholder="Min" />
              <input type="number" id="maxSalary" placeholder="Max" />
            </div>
          </div>

          <button class="btnPrimary wFull" type="button" onclick="loadJobs()">Apply filters</button>
        </aside>

        <div class="resultsPanel">
          <div class="resultsTopRow">
            <div class="resultsCount">
              <strong id="jobCount">0</strong> jobs
            </div>

            <div class="resultsControls">
              <span class="muted">Sort by</span>
              <select id="sortSelect" onchange="loadJobs()">
                <option value="default">Default</option>
                <option value="titleAsc">Title A-Z</option>
                <option value="titleDesc">Title Z-A</option>
              </select>
            </div>
          </div>

          <div class="jobList" id="jobList"></div>

          <div class="emptyState" id="emptyState" style="display:none;">
            <div class="emptyTitle">No jobs found</div>
            <div class="emptySub">Try changing your search or clearing filters.</div>
          </div>

          <div class="pagination">
            <button class="btnGhost" type="button">← Prev</button>
            <div class="pageNums">
              <span class="pageNum active">1</span>
            </div>
            <button class="btnGhost" type="button">Next →</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function clearFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("locationFilter").value = "";
      document.getElementById("categoryFilter").value = "";
      document.getElementById("minSalary").value = "";
      document.getElementById("maxSalary").value = "";
      document.getElementById("sortSelect").value = "default";

      document.querySelectorAll(".jobTypeFilter").forEach(box => {
        box.checked = false;
      });

      loadJobs();
    }

    function goToJobDetails(jobId) {
      window.location.href = `jobdetails.html?id=${jobId}`;
    }

    function getSelectedJobTypes() {
      return Array.from(document.querySelectorAll(".jobTypeFilter:checked"))
        .map(box => box.value.toLowerCase());
    }

    function extractSalaryNumber(salaryText) {
      if (!salaryText) return 0;
      const numbers = salaryText.replace(/[^0-9\-]/g, "").split("-");
      return parseInt(numbers[0], 10) || 0;
    }

    async function toggleSaveJob(jobId, buttonElement) {
      const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

      if (!loggedInUser || !loggedInUser.id) {
        alert("You must be logged in to save jobs.");
        return;
      }

      const isSaved = buttonElement.classList.contains("saved");

      try {
        if (isSaved) {
          const response = await fetch(
            `http://localhost:8080/api/saved-jobs/user/${loggedInUser.id}/job/${jobId}`,
            { method: "DELETE" }
          );

          if (!response.ok) {
            throw new Error("Failed to remove saved job");
          }

          buttonElement.classList.remove("saved");
          buttonElement.textContent = "♡";
        } else {
          const response = await fetch("http://localhost:8080/api/saved-jobs", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              userId: loggedInUser.id,
              jobId: jobId
            })
          });

          if (!response.ok) {
            throw new Error("Failed to save job");
          }

          buttonElement.classList.add("saved");
          buttonElement.textContent = "♥";
        }
      } catch (error) {
        console.error(error);
        alert("Could not update saved jobs.");
      }
    }

    async function loadJobs() {
      const jobList = document.getElementById("jobList");
      const emptyState = document.getElementById("emptyState");
      const jobCount = document.getElementById("jobCount");

      try {
        const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

        const jobsResponse = await fetch("http://localhost:8080/api/jobs");
        if (!jobsResponse.ok) {
          throw new Error("Failed to fetch jobs");
        }

        let jobs = await jobsResponse.json();

        let applications = [];
        let savedJobs = [];

        if (loggedInUser && loggedInUser.id) {
          const applicationsResponse = await fetch(
            `http://localhost:8080/api/applications/user/${loggedInUser.id}`
          );

          if (applicationsResponse.ok) {
            applications = await applicationsResponse.json();
          }

          const savedJobsResponse = await fetch(
            `http://localhost:8080/api/saved-jobs/user/${loggedInUser.id}`
          );

          if (savedJobsResponse.ok) {
            savedJobs = await savedJobsResponse.json();
          }
        }

        const applicationMap = {};
        applications.forEach(app => {
          applicationMap[app.jobId] = app.status;
        });

        const savedJobIds = new Set(savedJobs.map(saved => saved.jobId));

        const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
        const locationFilter = document.getElementById("locationFilter").value.toLowerCase();
        const categoryFilter = document.getElementById("categoryFilter").value.toLowerCase();
        const selectedJobTypes = getSelectedJobTypes();
        const minSalary = parseInt(document.getElementById("minSalary").value, 10) || 0;
        const maxSalary = parseInt(document.getElementById("maxSalary").value, 10) || Infinity;
        const sortValue = document.getElementById("sortSelect").value;

        jobs = jobs.filter(job => {
          const title = (job.title || "").toLowerCase();
          const company = (job.company || "").toLowerCase();
          const location = (job.location || "").toLowerCase();
          const category = (job.category || "").toLowerCase();
          const jobType = (job.jobType || "").toLowerCase();
          const salary = extractSalaryNumber(job.salary);

          const matchesSearch =
            !searchText ||
            title.includes(searchText) ||
            company.includes(searchText) ||
            category.includes(searchText);

          const matchesLocation =
            !locationFilter || location.includes(locationFilter);

          const matchesCategory =
            !categoryFilter || category.includes(categoryFilter);

          const matchesJobType =
            !selectedJobTypes.length || selectedJobTypes.some(type => jobType.includes(type));

          const matchesSalary =
            salary >= minSalary && salary <= maxSalary;

          return matchesSearch && matchesLocation && matchesCategory && matchesJobType && matchesSalary;
        });

        if (sortValue === "titleAsc") {
          jobs.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
        } else if (sortValue === "titleDesc") {
          jobs.sort((a, b) => (b.title || "").localeCompare(a.title || ""));
        }

        jobCount.textContent = jobs.length;

        if (!jobs.length) {
          jobList.innerHTML = "";
          emptyState.style.display = "block";
          return;
        }

        emptyState.style.display = "none";

        jobList.innerHTML = jobs.map(job => {
          const status = applicationMap[job.id] || "Apply";
          const statusClass = status.toLowerCase();
          const isSaved = savedJobIds.has(job.id);

          return `
            <div class="jobCard" data-job-id="${job.id}" onclick="goToJobDetails(${job.id})">
              <div class="jobIcon">${job.company ? job.company.charAt(0).toUpperCase() : "H"}</div>

              <div class="jobMain">
                <div class="jobTop">
                  <div class="jobTitleRow">
                    <div class="jobTitle">${job.title || "Untitled job"}</div>
                    <div class="jobCompany">${job.company || "Unknown company"} • ${job.location || "Unknown location"}</div>
                  </div>

                  <div class="jobMetaRight">
                    <span class="applicationStatusBadge ${statusClass}">${status}</span>
                  </div>
                </div>

                <div class="jobBadges">
                  <span class="badge">${job.category || "No category"}</span>
                  <span class="badge">${job.jobType || "No type"}</span>
                  <span class="badge">${job.salary || "Salary not listed"}</span>
                </div>
              </div>

              <div class="jobActions">
                <button
                  class="heartBtn ${isSaved ? "saved" : ""}"
                  type="button"
                  onclick="event.stopPropagation(); toggleSaveJob(${job.id}, this)">
                  ${isSaved ? "♥" : "♡"}
                </button>
              </div>
            </div>
          `;
        }).join("");

      } catch (error) {
        console.error(error);
        jobList.innerHTML = "";
        emptyState.style.display = "block";
        emptyState.querySelector(".emptyTitle").textContent = "Error loading jobs";
        emptyState.querySelector(".emptySub").textContent = "Please try again later.";
      }
    }

    loadJobs();
  </script>

</body>
</html>
