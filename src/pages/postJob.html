<!DOCTYPE html>
<html lang="en">
<head>


<!--links to fonts- dont touch unless changing ui -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!--link to style.css also dont touch just change style.css-->
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/postJob.css">


  <title>HireSpace - Post Job</title>
</head>
<body>

  <div class="bgWave">
  <img src="../assets/wave.svg" alt="">
</div>

<div class="container">
  
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logoDot">
          <img src="../assets/logo.png" alt="HireSpace logo">
        </div>
        <div class="brandText">
          <div class="name">HireSpace</div>
          <div class="tag">Job Advertisement Portal</div>
        </div>
      </div>
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="contact.html">Contact Us</a>
        <a href="profile.html" style="display:flex; align-items:center; gap:6px;">
          <img 
            src="../assets/profilePlaceholder.png" alt="Profile icon"style="width:16px; height:16px; border-radius:50%; object-fit:cover;">Profile</a>
          
      </div>
    </div>
  </div>

  <div class="container">
      <main class="container">
        <h2 class="title">Post Job</h2>
      <form action="#">
        <div class="input-box">
          <span class="details">Company Name</span>
          <input type="text" id="job-company" name="company-name" required>
        </div>
      
        <div class="input-box">
         <span class="details">Postcode</span>
          <input type="text" id="job-location" name="postcode" required>
        </div>


          <span class="details">Job Title</span>
          <input type="text" id="job-title" name="job-title" required>
            
        <div class="input-box">
          <span class="details">Job Category</span>
          <select id="job-category" name="job-category" required>
            <option value="">Select Job Category</option>
            <option value="it">IT</option>
            <option value="healthcare">Healthcare</option>
            <option value="education">Education</option>
            <option value="finance">Finance</option>
            <option value="engineering">Engineering</option>
          </select>
        </div>

        <div class="input-box">
          <span class="details">Job Type</span>
          <select id="job-type" name="job-type" required>
           <option value="">Select Job Type</option>
           <option value="full-time">Full-Time</option>
           <option value="part-time">Part-Time</option>
           <option value="contract">Contract</option>
           <option value="temporary">Temporary</option>
           <option value="internship">Internship</option>
           <option value="remote">Remote</option>
          </select>
        </div>
      
       <div class="input-box">
          <span class="details">Job Salary</span>
          <input type="text" id="job-salary" name="job-salary" required>  
        </div>

        <div class="input-box">
          <span class="details">Job Description</span>
          <textarea id="job-description" name="job-description" rows="5" required></textarea>
        </div>

        <div class="input-box">
          <span class="details">Qualifications</span>
          <textarea id="job-requirements" name="qualifications" rows="5" required></textarea>
        </div>

        
        <div class="input-box">
          <span class="details">Deadline Date</span>
          <textarea id="job-date" name="date" rows="1" required></textarea>
        </div>
      
        <div class="input-box">
          <span class="details">Contact Email</span>
          <textarea id="job-email" name="contact-email" rows="1" required></textarea>
        </div>

        <button type="submit" class="btnPrimary">Post Job</button>
      </form>

      </div>

<script>
// handle submission and send to API
const postForm = document.querySelector('form');
postForm.addEventListener('submit', async e => {
    e.preventDefault();

    const stored = localStorage.getItem('loggedInUser');
    if (!stored) {
        alert('You must be logged in as an employer to post a job.');
        window.location.href = 'login.html';
        return;
    }
    const user = JSON.parse(stored);
    if (user.role !== 'employer') {
        alert('Only employer accounts can post jobs.');
        return;
    }

    const job = {
        title: document.getElementById('job-title').value.trim(),
        company: document.getElementById('job-company').value.trim(),
        location: document.getElementById('job-location').value.trim(),
        category: document.getElementById('job-category').value,
        jobType: document.getElementById('job-type').value,
        salary: document.getElementById('job-salary').value.trim(),
        description: document.getElementById('job-description').value.trim(),
        requirements: document.getElementById('job-requirements').value.trim(),
        contactEmail: document.getElementById('job-email').value.trim(),
        deadlineDate: document.getElementById('job-date').value.trim(),
        // requirements and contact email not stored in backend model; optionally extend later
        employerUserId: user.id
    };

    // basic validation
    for (let key in job) {
        if (!job[key] && key !== 'salary') {
            alert('Please complete all required fields.');
            return;
        }
    }

    try {
        const resp = await fetch('http://localhost:8080/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(job)
        });
        if (!resp.ok) {
            const txt = await resp.text();
            alert('Failed to post job: ' + txt);
            return;
        }
        const saved = await resp.json();
        alert('Job posted successfully.');
        // optionally redirect to job list or clear form
        window.location.href = 'jobs.html';
    } catch (err) {
        console.error('Post job error', err);
        alert('Could not reach backend.');
    }
});
</script>

</body>
</html>
